name: Publish Container to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (example: v0.2.0 or 0.2.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target tag
        id: target
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RAW_TAG="$(jq -r '.inputs.tag // empty' "$GITHUB_EVENT_PATH")"
          elif [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RAW_TAG="$(jq -r '.release.tag_name // empty' "$GITHUB_EVENT_PATH")"
          else
            RAW_TAG=""
          fi

          if [ -z "$RAW_TAG" ]; then
            echo "Unable to resolve tag from event: ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          TAG="${RAW_TAG#v}"

          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout source at tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.target.outputs.raw_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare webfetcher metadata
        id: meta_webfetcher
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.target.outputs.tag }}
            type=sha

      - name: Build and push webfetcher image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webfetcher
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_webfetcher.outputs.tags }}
          labels: ${{ steps.meta_webfetcher.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare lightpanda metadata
        id: meta_lightpanda
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/lightpanda
          tags: |
            type=raw,value=${{ steps.target.outputs.tag }}
            type=sha

      - name: Build and push lightpanda image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lightpanda
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_lightpanda.outputs.tags }}
          labels: ${{ steps.meta_lightpanda.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
