name: Publish Container to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (example: 0.2.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target tag
        id: target
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source at tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.target.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare webfetcher metadata
        id: meta_webfetcher
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.target.outputs.tag }}
            type=sha

      - name: Build and push webfetcher image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webfetcher
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_webfetcher.outputs.tags }}
          labels: ${{ steps.meta_webfetcher.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare lightpanda metadata
        id: meta_lightpanda
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-lightpanda
          tags: |
            type=raw,value=${{ steps.target.outputs.tag }}
            type=sha

      - name: Build and push lightpanda image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lightpanda
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_lightpanda.outputs.tags }}
          labels: ${{ steps.meta_lightpanda.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max